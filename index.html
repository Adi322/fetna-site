<script>
tailwind.config = { theme: { extend: {
  colors: { maroon:"#6E1023", maroon2:"#8A1C2B", gold:"#C2902B", gold2:"#E3B23C",
            cream:"#FBF5E9", ink:"#2A1216", sage:"#2E7D6F" },
  fontFamily: { display:["Fraunces","Georgia","serif"], sans:["Hanken Grotesk","system-ui","sans-serif"], tamil:["Noto Sans Tamil","sans-serif"] },
}}};

<style>
  :root{ --maroon:#6E1023; --maroon2:#8A1C2B; --gold:#C2902B; --gold2:#E3B23C; --cream:#FBF5E9; --ink:#2A1216; }
  *{ font-family:"Hanken Grotesk",system-ui,sans-serif; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{ background:#FBF5E9; color:#2A1216;
    background-image:radial-gradient(rgba(110,16,35,.05) 1.4px, transparent 1.4px); background-size:26px 26px; }
  .disp{ font-family:"Fraunces",serif; }
  .ta{ font-family:"Noto Sans Tamil",sans-serif; }
  .leaflet-container{ font-family:"Hanken Grotesk"; background:#eee; }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; font-weight:600; font-size:15px; padding:11px 18px; border-radius:12px; border:0; cursor:pointer; transition:all .18s ease; }
  .btn-maroon{ background:var(--maroon); color:#fff; } .btn-maroon:hover{ background:var(--maroon2); }
  .btn-gold{ background:var(--gold); color:#2A1216; } .btn-gold:hover{ background:var(--gold2); }
  .btn-ghost{ background:#fff; color:var(--maroon); border:1.5px solid rgba(110,16,35,.25); } .btn-ghost:hover{ border-color:var(--maroon); }
  .btn-stop{ background:#B42318; color:#fff; } .btn-stop:hover{ background:#912018; }
  .btn:active{ transform:scale(.98); }
  .card{ background:#fff; border:1px solid rgba(110,16,35,.10); border-radius:16px; box-shadow:0 1px 2px rgba(42,18,22,.05); }
  .pill{ display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:999px; letter-spacing:.02em; }
  .chip{ font-size:13px; font-weight:600; padding:7px 14px; border-radius:999px; border:1.5px solid rgba(110,16,35,.18); background:#fff; color:#6b3b42; cursor:pointer; white-space:nowrap; transition:all .15s ease; }
  .chip.on{ background:var(--maroon); color:#fff; border-color:var(--maroon); }
  .field{ width:100%; border:1.5px solid rgba(110,16,35,.18); border-radius:12px; padding:12px 14px; font-size:16px; outline:none; background:#fff; }
  .field:focus{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(194,144,43,.18); }
  .topband{ background:linear-gradient(100deg,#6E1023,#8A1C2B); padding-top:env(safe-area-inset-top); }
  .safe-bottom{ padding-bottom:max(22px, env(safe-area-inset-bottom)); }
  .gold-rule{ height:3px; background:linear-gradient(90deg,transparent,var(--gold2),transparent); }
  ::-webkit-scrollbar{ width:8px; height:8px; } ::-webkit-scrollbar-thumb{ background:rgba(110,16,35,.2); border-radius:8px; }
  .veh-badge{ display:flex; align-items:center; justify-content:center; width:38px; height:38px; border-radius:999px; font-weight:800; font-size:13px; color:#fff; box-shadow:0 2px 8px rgba(0,0,0,.35); border:3px solid #fff; }
  .veh-badge.stale{ opacity:.85; }
  .veh-pin{ position:relative; display:flex; align-items:center; gap:3px; padding:3px 8px 3px 5px; border-radius:999px; font-weight:800; font-size:12px; color:#fff; box-shadow:0 2px 8px rgba(0,0,0,.35); border:2.5px solid #fff; white-space:nowrap; line-height:1; }
  .veh-pin.stale{ opacity:.7; }
  .veh-pin .veh-ico{ display:flex; align-items:center; }
  .veh-z{ position:absolute; top:-13px; right:-8px; font-weight:900; color:#9A6B12; text-shadow:0 1px 2px rgba(255,255,255,.9); pointer-events:none; }
  .veh-z .z1{ font-size:9px; display:inline-block; animation:zfloat 1.8s ease-in-out infinite; }
  .veh-z .z2{ font-size:12px; display:inline-block; animation:zfloat 1.8s ease-in-out .3s infinite; }
  .veh-z .z3{ font-size:15px; display:inline-block; animation:zfloat 1.8s ease-in-out .6s infinite; }
  @keyframes zfloat{ 0%{transform:translateY(2px);opacity:.2} 50%{transform:translateY(-4px);opacity:1} 100%{transform:translateY(2px);opacity:.2} }
  .veh-err{ position:absolute; top:-12px; right:-10px; width:19px;height:19px;border-radius:50%; background:#B42318; color:#fff; font-size:12px; font-weight:900; display:flex; align-items:center; justify-content:center; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.35); animation:errpulse 1.1s ease-in-out infinite; pointer-events:none;}
  @keyframes errpulse{ 0%,100%{transform:scale(1);opacity:.85} 50%{transform:scale(1.18);opacity:1} }
  .veh-pin.lost{ filter:grayscale(.4); }
  .veh-trip{ margin-top:3px; font-size:9.5px; font-weight:700; color:#3c2a2e; background:rgba(255,255,255,.95); border:1px solid rgba(110,16,35,.18); border-radius:6px; padding:1px 6px; white-space:nowrap; box-shadow:0 1px 3px rgba(0,0,0,.18); }
  .pulse{ animation:pulse 2s ease-out infinite; } @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,125,111,.5)}70%{box-shadow:0 0 0 12px rgba(46,125,111,0)}100%{box-shadow:0 0 0 0 rgba(46,125,111,0)}}
  .slidein{ animation:slidein .25s ease; } @keyframes slidein{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
  .glow{ box-shadow:0 0 0 3px rgba(227,178,60,.35); }
</style>
</head>
<body>

<div id="app"></div>
<div id="toast-root" style="position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:3000;display:flex;flex-direction:column;gap:8px;align-items:center"></div>

<script>
/* ============================================================
   FeTNA 2026 — SHUTTLE TRACKER
   Single-file app · real GPS via Socket.io relay · Leaflet map
   ── EDIT THE CONFIG BELOW, then deploy to any HTTPS host ──
   ============================================================ */

/* 1) EVENT CONFIG ------------------------------------------------ */
const CONFIG = {
  eventName: "FeTNA 2026",
  eventDates: "July 2–4, 2026",
  hub: { name:"NJ Expo", lat:40.5188, lng:-74.3294 },
  driverCode: "fetna26",     // simple gate so only drivers open the driver console
  staleAfterSec: 12,         // mark a vehicle "last seen" after this many seconds of silence
  writeIntervalMs: 3500,     // how often a driver phone pushes its location
};

/* 2) RELAY SERVER  ----------------------------------------------- */
/*  Paste the https URL of your own Socket.io relay (server.js).    */
/*  Free hosts: Render / Railway / Fly.io / Glitch. Must be https.  */
/*  Leave as PASTE_… to run in local demo mode.                     */
const SERVER_URL = "https://fetna-relay.onrender.com";   // e.g. "https://fetna-relay.onrender.com"

/* 3) ROUTES (edit freely once organizers confirm loops) --------- */
const ROUTES = [
  { id:"A", name:"Route A — Sheraton Express",       ta:"ஷெரட்டன் எக்ஸ்பிரஸ்", color:"#6E1023" },
  { id:"B", name:"Route B — HGI + Courtyard Loop",   ta:"ஹில்டன்/கோர்ட்யார்ட்",  color:"#1A5CA8" },
  { id:"C", name:"Route C — Overflow (contingency)", ta:"கூடுதல் வழி",          color:"#6b6760" },
];

/* 4) STOPS — simplified pickup/drop points (match the color-code sheet) */
const STOPS = [
  { name:"Sheraton",  lat:40.5205, lng:-74.3470, route:"A" },
  { name:"HGI",       lat:40.5360, lng:-74.3450, route:"B" },
  { name:"Courtyard", lat:40.5420, lng:-74.3380, route:"C" },
];

/* 5) VEHICLES — default fleet; admin can add/edit (syncs via relay). */
let VEHICLES = [
  { id:"A1", label:"A1 · Sheraton Express", type:"bus", route:"A" },
  { id:"A2", label:"A2 · Sheraton Express", type:"bus", route:"A" },
  { id:"A3", label:"A3 · Surge / Flex",     type:"bus", route:"A" },
  { id:"B1", label:"B1 · HGI + Courtyard",  type:"bus", route:"B" },
  { id:"B2", label:"B2 · HGI + Courtyard",  type:"bus", route:"B" },
  { id:"SB", label:"SB · Standby / ADA",    type:"bus", route:"C" },
];

/* ============================================================
   Boot / state  +  connectivity (Socket.io — your own relay)
   ============================================================ */
const $=(id)=>document.getElementById(id);
const CONFIGURED = !SERVER_URL.includes("PASTE") && !!window.io;
let socket=null;
const net={ configured:CONFIGURED, connected:false, lastError:null, lastWriteOk:0, mixed:false };

// Block the classic mistake: https page → http server is blocked by the browser.
if(CONFIGURED && location.protocol==="https:" && SERVER_URL.startsWith("http://")){
  net.mixed=true; net.lastError="Page is https but SERVER_URL is http:// (browser blocks this). Use an https:// relay URL.";
}

if(CONFIGURED && !net.mixed){
  try{
    socket=io(SERVER_URL,{ transports:["websocket","polling"], reconnection:true });
    socket.on("connect",()=>{ net.connected=true; net.lastError=null; socket.emit("getSnapshot"); updateStatusPills(); });
    socket.on("disconnect",()=>{ net.connected=false; updateStatusPills(); });
    socket.on("connect_error",(e)=>{ net.lastError=(e&&e.message)||"connect_error"; net.connected=false; updateStatusPills(); });
    // server pushes either a full snapshot or single-vehicle updates
    socket.on("snapshot",(data)=>{ if(data) Object.keys(data).forEach(id=>mergeVehicle(data[id])); rerenderLive(); });
    socket.on("vehicle",(rec)=>{ mergeVehicle(rec); rerenderLive(); });
    // trips + occupancy (for the Ops analytics)
    socket.on("tripsSnapshot",(arr)=>{ if(Array.isArray(arr)){ TRIPS=arr; backupTrips(); maybeRenderOps(); } });
    socket.on("trip",(rec)=>{ if(rec){ TRIPS.push(rec); backupTrips(); maybeRenderOps(); } });
    socket.on("occupancy",(o)=>{ if(o){ OCC=o; maybeRenderOps(); } });
    // custom names (driver or admin set them) + action log
    socket.on("names",(map)=>{ if(map){ NAMES=map; Object.keys(map).forEach(id=>{ if(VEH[id]) VEH[id].name=map[id]; }); rerenderLive(); maybeRenderOps(); } });
    socket.on("roster",(list)=>{ applyRoster(list); });
    socket.on("vehicleGone",({id})=>{ if(!id) return; if(markers[id]){ try{ map.removeLayer(markers[id]); }catch(e){} delete markers[id]; } if(VEH[id]){ VEH[id].status="offline"; VEH[id].onboard=0; VEH[id].tripFrom=""; VEH[id].tripTo=""; VEH[id].driverName=""; VEH[id].lat=null; VEH[id].lng=null; VEH[id].ts=0; } rerenderLive(); maybeRenderOps(); });
    socket.on("actionsSnapshot",(arr)=>{ if(Array.isArray(arr)){ ACTIONS=arr; maybeRenderOps(); } });
    socket.on("action",(a)=>{ if(a){ ACTIONS.push(a); maybeRenderOps(); } });
    socket.on("connect",()=>{ socket.emit("getTrips"); });
  }catch(e){ net.lastError=(e&&e.message)||String(e); }
  // Re-evaluate vehicle freshness every 2s so a driver going silent flips to
  // "signal lost" / "offline" promptly even if no new events arrive.
  if(!window._liveTick){ window._liveTick=setInterval(()=>{ rerenderLive(); maybeRenderOps(); }, 2000); }
}
function mergeVehicle(rec){
  if(!rec||!rec.id||!VEH[rec.id]) return;
  const cfg=VEHICLES.find(v=>v.id===rec.id)||{};
  VEH[rec.id]={ ...VEH[rec.id], ...rec };
  if(cfg.label) VEH[rec.id].label=cfg.label;      // roster name wins
  if(cfg.route) VEH[rec.id].route=cfg.route;      // roster route wins
  if(!rec.type && cfg.type) VEH[rec.id].type=cfg.type;
}

const ROUTE=Object.fromEntries(ROUTES.map(r=>[r.id,r]));
const COLOR={ bus:"#6E1023", van:"#C2902B" };

/* ---- LINE scheme (from the color-code sheet) ----
   The hotel endpoint (not NJ Expo) decides line + color.
   Sheraton = Line A (orange) · HGI = Line B (blue) · Courtyard = Line C (yellow) */
const LINES = {
  "Sheraton":  { letter:"A", color:"#E8820C", text:"#ffffff", name:"Line A · Sheraton" },
  "HGI":       { letter:"B", color:"#1D4ED8", text:"#ffffff", name:"Line B · HGI" },
  "Courtyard": { letter:"C", color:"#F5C400", text:"#3a2e00", name:"Line C · Courtyard" },
};
const ROUTE_TO_LINE = { A:"Sheraton", B:"HGI", C:"Courtyard" };
const DEFAULT_LINE = { letter:"", color:"#6b6760", text:"#ffffff", name:"Shuttle" };
function nonExpo(from,to){ const a=(from||"").trim(), b=(to||"").trim(); if(a && a!=="NJ Expo") return a; if(b && b!=="NJ Expo") return b; return null; }
function lineFor(v){ if(!v) return DEFAULT_LINE; let k=(v.tripFrom&&v.tripTo)?nonExpo(v.tripFrom,v.tripTo):null; if(!k) k=ROUTE_TO_LINE[v.route]; return LINES[k]||DEFAULT_LINE; }
function lineName(v){ return lineFor(v).name; }
function busTitle(v){ if(v&&v.tripFrom&&v.tripTo){ const L=lineFor(v); return (L.letter?L.letter+" ":"")+v.tripFrom+" - "+v.tripTo; } return v?v.id:""; }
function vcolor(v){ return lineFor(v).color; }
function vlabel(v){ return v?(v.label||v.id):""; }

// VEH = single source of truth for rendering.
// Seed every vehicle with a starting spot around the hub so ALL 8 show on the map
// immediately (as "awaiting driver"); live GPS/sim updates overwrite these.
const VEH={};
function rebuildFleet(){
  VEHICLES.forEach((v,i)=>{
    if(VEH[v.id]){ VEH[v.id].label=v.label; VEH[v.id].route=v.route; VEH[v.id].type=v.type; }
    else {
      const ang=(i/Math.max(1,VEHICLES.length))*Math.PI*2, r=0.006+ (i%2)*0.003;
      VEH[v.id]={ ...v, lat:CONFIG.hub.lat+Math.sin(ang)*r, lng:CONFIG.hub.lng+Math.cos(ang)*r, heading:0, status:"offline", ts:0, driverName:"" };
    }
  });
  Object.keys(VEH).forEach(id=>{ if(!VEHICLES.find(v=>v.id===id)){ delete VEH[id]; if(typeof markers!=="undefined" && markers[id]){ try{ map.removeLayer(markers[id]); }catch(e){} delete markers[id]; } } });
}
function applyRoster(list){
  if(!Array.isArray(list)||!list.length) return;
  VEHICLES = list.map(r=>({ id:r.id, label:r.label||r.id, type:(r.type==="van"?"van":"bus"), route:(["A","B","C"].includes(r.route)?r.route:"A") }));
  rebuildFleet(); rerenderLive(); maybeRenderOps();
}
rebuildFleet();

let lang = localStorage.getItem("fetna_lang") || "en";
let routeFilter = "all";

/* ---- trip analytics + occupancy state ---- */
const LOCATIONS = ["NJ Expo","Sheraton","HGI","Courtyard"];
let TRIPS = [];                 // [{from,to,passengers,queue,ts,label,vehicleId}]
let NAMES = {};                 // id -> custom name
let ACTIONS = [];               // [{vehicleId,label,type,from,to,people,ts}]
let adminUnlocked = (sessionStorage.getItem("fetna_admin_ok")==="1");
const ADMIN_CODE = "fetna-admin-26";
let OCC = {};                   // { location: {count,note,ts,queue,queueTs} }
let opsRange = "all";           // date/time filter window
const curRoute=()=> (location.hash.replace("#","")||"riders");
function backupTrips(){ try{ localStorage.setItem("fetna_trips_backup", JSON.stringify(TRIPS.slice(-5000))); }catch(e){} }
try{ const b=localStorage.getItem("fetna_trips_backup"); if(b && TRIPS.length===0) TRIPS=JSON.parse(b)||[]; }catch(e){}
function rangeStart(){ const now=Date.now();
  if(opsRange==="1h") return now-3600e3;
  if(opsRange==="3h") return now-3*3600e3;
  if(opsRange==="today"){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
  return 0;
}
function tripsInRange(){ const s=rangeStart(); return TRIPS.filter(t=>t.ts>=s); }
function setOpsRange(r){ opsRange=r; render(); }

/* connection status helpers ---------------------------------- */
function connState(){
  if(!net.configured) return {key:"local", label:"Local only", dot:"#B42318", desc:"No relay set — locations stay on this device."};
  if(net.mixed)       return {key:"error", label:"Config error", dot:"#B42318", desc:net.lastError};
  if(net.connected)   return {key:"live", label:"Live", dot:"#2E7D6F", desc:"Connected to relay — locations sync across devices."};
  if(net.lastError)   return {key:"error", label:"No connection", dot:"#B42318", desc:net.lastError};
  return {key:"connecting", label:"Connecting…", dot:"#C2902B", desc:"Reaching the relay server…"};
}
function statusPill(){
  const c=connState();
  return `<button onclick="openDiag()" class="flex items-center gap-1.5 text-[11px] font-bold rounded-full px-2.5 py-1" style="background:rgba(255,255,255,.14);border:1px solid rgba(227,178,60,.4);color:#fff">
    <span style="width:8px;height:8px;border-radius:99px;background:${c.dot};${c.key==='live'?'box-shadow:0 0 0 3px '+c.dot+'33':''}"></span>${c.label}</button>`;
}
function updateStatusPills(){ document.querySelectorAll("[data-statuspill]").forEach(el=>{ el.outerHTML=`<span data-statuspill>${statusPill()}</span>`; }); }

/* i18n (English always present; toggle switches primary labels) */
const T={
  title:{en:"Shuttle Tracker", ta:"ஷட்டில் கண்காணிப்பு"},
  riders:{en:"Riders", ta:"பயணிகள்"}, driver:{en:"Driver", ta:"ஓட்டுநர்"}, ops:{en:"Ops", ta:"நிர்வாகம்"},
  live:{en:"LIVE", ta:"நேரலை"},
  all:{en:"All", ta:"அனைத்தும்"}, buses:{en:"Buses", ta:"பேருந்துகள்"}, vans:{en:"Vans", ta:"வேன்கள்"},
  in_service:{en:"In service", ta:"இயக்கத்தில்"}, on_break:{en:"On break", ta:"இடைவேளை"}, full:{en:"Full", ta:"நிரம்பியது"}, offline:{en:"Offline", ta:"இணைப்பில் இல்லை"},
  lastseen:{en:"last seen", ta:"கடைசியாக"}, nearme:{en:"Shuttles near me", ta:"அருகில்"},
  start:{en:"Start sharing location", ta:"இருப்பிடத்தைப் பகிர்"}, stop:{en:"Stop sharing", ta:"பகிர்வை நிறுத்து"},
  pick:{en:"Select your vehicle", ta:"உங்கள் வாகனத்தைத் தேர்ந்தெடுக்கவும்"}, away:{en:"min away", ta:"நிமிடம்"},
};
const t=(k)=> (T[k]?.[lang]) || (T[k]?.en) || k;
function setLang(l){ lang=l; localStorage.setItem("fetna_lang",l); render(); }

/* toast */
function toast(msg,kind="ok"){
  const c={ok:"#2E7D6F",info:"#6E1023",warn:"#C2902B",err:"#B42318"}[kind]||"#2E7D6F";
  const el=document.createElement("div");
  el.className="slidein"; el.style.cssText="background:#2A1216;color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.3);border-left:4px solid "+c;
  el.textContent=msg; $("toast-root").appendChild(el);
  setTimeout(()=>{ el.style.transition="opacity .3s"; el.style.opacity="0"; setTimeout(()=>el.remove(),300); },2400);
}

/* utils */
function ago(ts){ if(!ts) return "—"; const s=Math.round((Date.now()-ts)/1000); if(s<5)return "now"; if(s<60)return s+"s"; const m=Math.round(s/60); return m+"m"; }
function isStale(v){ return !v.ts || (Date.now()-v.ts)/1000 > CONFIG.staleAfterSec; }
const LOST_MS = 4*60*1000;
function effStatus(v){
  if(!v) return "offline";
  if(v.status==='on_break') return 'on_break';
  if(v.status==='lost') return 'lost';
  // Driver app reports its live signal health. If GPS/internet is degraded, show
  // "signal lost" immediately rather than waiting for the stale timeout.
  if(v.signal && v.signal!=='ok' && v.signal!=='acquiring' && v.signal!=='idle') return 'lost';
  if(isStale(v)){ return (v.ts && (Date.now()-v.ts) < LOST_MS) ? 'lost' : 'offline'; }
  return v.status||"in_service";
}
function statusStyle(s){ return {in_service:["#E4F2EE","#1F6E5E"],on_break:["#FBEFD7","#9A6B12"],full:["#FBE3E3","#B42318"],lost:["#FBE3E3","#B42318"],offline:["#ECE6DB","#7A6A5C"]}[s]||["#ECE6DB","#7A6A5C"]; }
function statusLabel(s){ return {in_service:t("in_service"),on_break:t("on_break"),full:t("full"),lost:"⚠ Signal lost",offline:t("offline")}[s]||s; }
function haversine(a,b,c,d){ const R=6371,dLat=(c-a)*Math.PI/180,dLng=(d-b)*Math.PI/180,la=a*Math.PI/180,lc=c*Math.PI/180; const x=Math.sin(dLat/2)**2+Math.sin(dLng/2)**2*Math.cos(la)*Math.cos(lc); return R*2*Math.asin(Math.sqrt(x)); }
function vehSVG(type,fill){ fill=fill||"#fff"; const sh=(fill==="#fff")?"rgba(0,0,0,.32)":"rgba(255,255,255,.45)"; return type==="bus"

/* ============================================================
   Live updates arrive via Socket.io events (see boot section).
   ============================================================ */
function pushVehicle(id, patch){
  const rec={ ...VEH[id], ...patch, ts:Date.now() };
  delete rec._sx; delete rec._sy; delete rec._vx; delete rec._vy; // don't transmit sim helpers
  VEH[id]=rec;
  if(socket && net.connected){
    const slim={ id:rec.id, label:rec.label, type:rec.type, route:rec.route, lat:rec.lat, lng:rec.lng, heading:rec.heading, status:rec.status, ts:rec.ts };
    socket.emit("update", slim, (ack)=>{ if(ack&&ack.ok){ net.lastWriteOk=Date.now(); updateStatusPills(); } });
    net.lastWriteOk=Date.now();
  }
  rerenderLive();
}

  const wrap=document.createElement("div"); wrap.innerHTML=rootHtml; document.body.appendChild(wrap.firstElementChild);

function closeDiag(){ $("diag")?.remove(); }
function testConn(){
  const out=$("diag-test");
  if(!net.configured){ if(out) out.innerHTML='<span style="color:#B42318">No relay URL set — paste your server URL into SERVER_URL.</span>'; return; }
  if(!socket){ if(out) out.innerHTML='<span style="color:#B42318">Socket not created (check SERVER_URL / mixed-content).</span>'; return; }
  if(out) out.textContent="Pinging relay…";
  let done=false;
  const to=setTimeout(()=>{ if(!done&&out) out.innerHTML='<span style="color:#B42318">✗ No response. Relay may be asleep (free hosts nap) or URL is wrong. Open the URL in a browser to wake it, then retry.</span>'; },5000);
  socket.timeout(4500).emit("ping", Date.now(), (err,serverTs)=>{
    done=true; clearTimeout(to);
    if(err){ if(out) out.innerHTML='<span style="color:#B42318">✗ '+(err.message||'timeout')+'</span>'; return; }
    net.lastWriteOk=Date.now(); updateStatusPills();
    if(out) out.innerHTML='<span style="color:#1F6E5E">✓ Relay responded — cross-device sync is working!</span>';
  });
}

function modeBanner(){
  if(net.configured && net.connected) return "";
  const msg = !net.configured
    ? `<b>Not syncing across devices.</b> No relay server is set, so a driver's location only shows on their own phone. <u>Tap here to set it up</u>.`
    : `<b>Connecting to relay…</b> If this stays red, the relay may be asleep or the URL is wrong. <u>Tap to check</u>.`;
  return `<div class="max-w-2xl mx-auto px-4 mt-3"><button onclick="openDiag()" class="card p-3 flex items-start gap-3 w-full text-left" style="border-color:rgba(180,35,24,.4);background:#FBE3E3">
    <span class="text-xl">⚠️</span><div class="text-[13px]">${msg}</div></button></div>`;
}

        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6E1023" stroke-width="2"><path d="M3 8V5a2 2 0 012-2h3M16 3h3a2 2 0 012 2v3M21 16v3a2 2 0 01-2 2h-3M8 21H5a2 2 0 01-2-2v-3"/></svg>

function centerOnMe(){ findNearMe(); }
function fitAll(){
  if(!map) return;
  const pts=Object.values(VEH).filter(v=>v.lat!=null).map(v=>[v.lat,v.lng]);
  if(userLoc) pts.push([userLoc.lat,userLoc.lng]);
  if(pts.length){ map.fitBounds(L.latLngBounds(pts).pad(0.25)); } else map.setView([CONFIG.hub.lat,CONFIG.hub.lng],14);
}
function initMap(){
  const h=CONFIG.hub;
  map=L.map("map",{zoomControl:true}).setView([h.lat,h.lng],14);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{maxZoom:20,attribution:"© OpenStreetMap © CARTO"}).addTo(map);
  // hub marker (NJ Convention Center) — a regular map pin, not a text box
  const pinSVG=`<svg width="34" height="42" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.7 0 1 4.7 1 11c0 7.5 11 19 11 19s11-11.5 11-19C23 4.7 18.3 0 12 0z" fill="#2A1216" stroke="#E3B23C" stroke-width="1.5"/><circle cx="12" cy="11" r="4.2" fill="#E3B23C"/></svg>`;
  L.marker([h.lat,h.lng],{icon:L.divIcon({className:"",html:pinSVG,iconSize:[34,42],iconAnchor:[17,42]})}).addTo(map).bindTooltip(h.name,{direction:"top",offset:[0,-38]});
  // stops (skip NJ Convention Center — the hub pin already marks it)
  stopMarkers=STOPS.filter(s=>s.name!=="NJ Convention Center").map(s=>L.circleMarker([s.lat,s.lng],{radius:5,color:ROUTE[s.route]?.color||"#6E1023",fillColor:"#fff",fillOpacity:1,weight:2}).addTo(map).bindTooltip(s.name,{direction:"top"}));
  markers={};
  renderMarkers();
  setTimeout(()=>map.invalidateSize(),200);
}
function shortCode(v){ return lineFor(v).letter || ((v.id||"").slice(0,1).toUpperCase()); }
function vehSVGsm(type,fill){ fill=fill||"#fff"; const sh=(fill==="#fff")?"rgba(0,0,0,.35)":"rgba(255,255,255,.45)"; return type==="bus"
  ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="13" rx="2" fill="${fill}"/><rect x="5" y="6" width="14" height="5" rx="1" fill="${sh}"/><circle cx="7.5" cy="18.5" r="2" fill="${fill}"/><circle cx="16.5" cy="18.5" r="2" fill="${fill}"/></svg>`
  : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 7h11l4 4v6H3z" fill="${fill}"/><rect x="5" y="9" width="6" height="4" fill="${sh}"/><circle cx="7.5" cy="18.5" r="2" fill="${fill}"/><circle cx="16" cy="18.5" r="2" fill="${fill}"/></svg>`; }
function renderMarkers(){
  if(!map) return;
  Object.values(VEH).forEach(v=>{
    const s=effStatus(v);
    // No driver / fully offline → no marker on the map.
    if(v.lat==null || s==='offline'){ if(markers[v.id]){ map.removeLayer(markers[v.id]); delete markers[v.id]; } return; }
    const L0=lineFor(v), col=L0.color, txt=L0.text, onBreak=(s==='on_break'), lost=(s==='lost');
    const zzz = onBreak ? `<span class="veh-z"><span class="z1">z</span><span class="z2">z</span><span class="z3">z</span></span>` : "";
    const err = lost ? `<span class="veh-err">!</span>` : "";
    const onTrip = (v.tripFrom && v.tripTo && s!=='offline');
    const caption = onTrip ? `<div class="veh-trip">${v.tripFrom} → ${v.tripTo}</div>` : "";

function tip(v){ if(!v) return ""; const s=effStatus(v); const off=(s==='offline'); const aboard=(!off&&v.onboard!=null&&v.onboard!=="")?` · <b>${v.onboard}</b> aboard`:""; const heading=(!off&&v.tripFrom&&v.tripTo)?`<br><span style="color:#6E1023">🚍 ${v.tripFrom} → ${v.tripTo}</span>`:""; return `<b>${lineName(v)}</b> · ${t("lastseen")} ${ago(v.ts)}<br>${statusLabel(s)}${aboard}${heading}`; }

function renderVehList(){

    const aboard=(s!=='offline'&&v.onboard!=null&&v.onboard!=="")?`<span class="text-[11px] font-semibold px-1.5 py-0.5 rounded" style="background:#E4F2EE;color:#1F6E5E">${v.onboard} aboard</span>`:"";
    const heading=(s!=='offline'&&v.tripFrom&&v.tripTo)?`<div class="text-[12.5px] font-semibold mt-0.5" style="color:#6E1023">🚍 ${v.tripFrom} → ${v.tripTo}</div>`:"";
    return `<button onclick="focusVeh('${v.id}')" class="card w-full text-left p-3 flex items-center gap-3 ${s!=='offline'?'':'opacity-80'}">
      <span class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 font-extrabold text-[12px]" style="background:${col};color:${lineFor(v).text}">${shortCode(v)}</span>

        ${heading}

      </div>
      ${dist}
      <span class="pill" style="background:${bg};color:${fg}">${s!=='offline'?'<span class="pulse" style="width:7px;height:7px;border-radius:99px;background:'+fg+';display:inline-block"></span>':''}${statusLabel(s)}</span>
    </button>`;
  }).join("");
}
function findNearMe(){
  if(!navigator.geolocation){ toast("Location not supported","err"); return; }
  toast("Finding your location…","info");
  navigator.geolocation.getCurrentPosition(p=>{
    userLoc={lat:p.coords.latitude,lng:p.coords.longitude};
    if(map){ if(userMarker) map.removeLayer(userMarker);

async function startDriving(){
  const id=driverState.vehicleId;
  if(!navigator.geolocation){ toast("GPS not supported on this device","err"); return; }
  if(!window.isSecureContext){ toast("Needs https:// to read GPS","err"); return; }
  try{ if("wakeLock" in navigator){ driverState.wakeLock=await navigator.wakeLock.request("screen"); } }catch(e){}
  driverState.fixes=0;
  driverState.watchId=navigator.geolocation.watchPosition(p=>{
    const now=Date.now(); driverState.fixes++;
    const lat=p.coords.latitude, lng=p.coords.longitude, heading=p.coords.heading||0, acc=Math.round(p.coords.accuracy||0);
    const ro=$("gps-readout"); if(ro) ro.innerHTML=`📡 ${lat.toFixed(5)}, ${lng.toFixed(5)} · ±${acc}m · ${driverState.fixes} fixes`;
    if(now-driverState.lastWrite >= CONFIG.writeIntervalMs || driverState.lastWrite===0){
      driverState.lastWrite=now;
      pushVehicle(id,{ lat,lng,heading, status:(VEH[id].status&&VEH[id].status!=='offline')?VEH[id].status:'in_service' });
    }
  },err=>{
    const ro=$("gps-readout"); if(ro) ro.innerHTML=`<span style="color:#B42318">⚠ ${err.code===1?'Location permission denied':'Location error'} — please allow location.</span>`;
  },{enableHighAccuracy:true,maximumAge:2000,timeout:12000});
  toast("Sharing your live location","ok");
  if(!net.configured){ toast("⚠ Local only — not reaching other phones. Tap the status pill to set up the relay.","warn"); }
  else if(!net.connected){ toast("Relay not connected yet — tap the status pill to check.","info"); }
  render();
}
function stopDriving(){
  if(driverState.watchId!=null){ navigator.geolocation.clearWatch(driverState.watchId); driverState.watchId=null; }
  if(driverState.wakeLock){ try{driverState.wakeLock.release();}catch(e){} driverState.wakeLock=null; }
  pushVehicle(driverState.vehicleId,{ status:"offline" });
  toast("Stopped sharing","info"); render();
}

/* ---- Trip & ridership analytics (from driver-logged trips) ---- */
function viewTripAnalytics(){
  const ranges=[["1h","Last hour"],["3h","Last 3h"],["today","Today"],["all","All"]];
  const inRange=tripsInRange();
  const totalPax=inRange.reduce((s,t)=>s+(t.passengers||0),0);
  const totalTrips=inRange.length;
  // per-location aggregation
  const byLoc={};
  LOCATIONS.forEach(l=>byLoc[l]={trips:0,pax:0,queue:null,qTs:0});
  inRange.forEach(t=>{ const k=byLoc[t.from]||(byLoc[t.from]={trips:0,pax:0,queue:null,qTs:0}); k.trips++; k.pax+=(t.passengers||0); if(t.queue!=null && t.ts>=k.qTs){ k.queue=t.queue; k.qTs=t.ts; } });
  const locs=Object.keys(byLoc);
  const maxPax=Math.max(1,...locs.map(l=>byLoc[l].pax));

  return `
  <div class="card mt-4">
    <div class="flex items-center justify-between p-3 border-b" style="border-color:rgba(110,16,35,.1)">
      <h2 class="disp text-lg font-bold">Ridership</h2>
      <div class="flex gap-1">
        ${ranges.map(([r,l])=>`<button onclick="setOpsRange('${r}')" class="text-[12px] font-bold px-2.5 py-1.5 rounded-lg" style="${opsRange===r?'background:#6E1023;color:#fff':'background:#fff;color:#6b3b42;border:1.5px solid rgba(110,16,35,.18)'}">${l}</button>`).join("")}
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3 p-3">
      <div class="text-center p-3 rounded-xl" style="background:#F4EEE3"><p class="disp text-3xl font-bold" style="color:#6E1023">${totalPax}</p><p class="text-[12px] font-semibold" style="color:#9b8b80">people ferried</p></div>
      <div class="text-center p-3 rounded-xl" style="background:#F4EEE3"><p class="disp text-3xl font-bold" style="color:#C2902B">${totalTrips}</p><p class="text-[12px] font-semibold" style="color:#9b8b80">trips made</p></div>
    </div>

    <div class="px-3 pb-3 space-y-3">
      ${locs.map(l=>{
        const d=byLoc[l]; const occ=OCC[l]||{};
        const waiting = d.queue!=null ? d.queue : (occ.queue!=null?occ.queue:null);
        const housed = occ.count!=null?occ.count:null;
        return `<div class="rounded-xl p-3" style="border:1px solid rgba(110,16,35,.12)">
          <div class="flex items-center justify-between">
            <p class="font-bold text-[14px]">${l}</p>
            <p class="text-[12px]" style="color:#9b8b80">${d.trips} trips · ${d.pax} ferried</p>
          </div>
          <div class="h-2 rounded-full mt-2" style="background:#EDE6DA"><div class="h-full rounded-full" style="width:${Math.round(d.pax/maxPax*100)}%;background:#6E1023"></div></div>
          <div class="flex items-center gap-2 mt-2 flex-wrap">
            ${waiting!=null?`<span class="pill" style="background:#FBE3E3;color:#B42318">⏳ ${waiting} waiting</span>`:`<span class="pill" style="background:#ECE6DB;color:#7A6A5C">queue n/a</span>`}
            ${housed!=null?`<span class="pill" style="background:#E4F2EE;color:#1F6E5E">🏨 ${housed} at location</span>`:""}
            <button onclick="editOccupancy('${l.replace(/'/g,"\\'")}')" class="text-[12px] font-bold px-2 py-1 rounded-lg ml-auto" style="border:1.5px solid rgba(110,16,35,.2);color:#6E1023">Set people here</button>
          </div>
          ${(housed!=null && d.pax>=0)?`<p class="text-[12px] mt-2" style="color:#7a6a5c">Est. still to move: <b>${Math.max(0,(housed)-d.pax)}</b> (housed − ferried in window)</p>`:""}
        </div>`;
      }).join("")}
      ${totalTrips===0?`<p class="text-center text-[13px] py-3" style="color:#9b8b80">No trips logged in this window yet. Drivers log them from the driver app after each run.</p>`:""}
    </div>
    <div class="px-3 pb-3">
      <button onclick="exportTripsCSV()" class="btn btn-soft w-full text-[13px]">⬇ Export trips (CSV)</button>
    </div>
  </div>`;
}
function editOccupancy(loc){
  const cur=OCC[loc]||{};
  const val=prompt(`How many people are housed / present at "${loc}" right now? (hotel guests or program attendees)`, cur.count!=null?cur.count:"");
  if(val===null) return;
  const count=Math.max(0,parseInt(val)||0);
  if(socket && net.connected){ socket.emit("setOccupancy",{location:loc,count},(ack)=>{ if(!(ack&&ack.ok)) toast("Couldn't save — check connection","err"); else toast("Saved people at "+loc); }); }
  else { OCC[loc]={...(OCC[loc]||{}),count,ts:Date.now()}; render(); toast("Saved locally (relay offline)","warn"); }
}
function exportTripsCSV(){
  const rows=[["time","vehicle","type","from","passengers","queue_waiting"]];
  tripsInRange().forEach(t=>rows.push([new Date(t.ts).toISOString(), t.label||t.vehicleId, t.type, t.from, t.passengers, (t.queue==null?"":t.queue)]));
  const csv=rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download="fetna-trips.csv"; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function opsToggle(id){ const v=VEH[id]; const s=effStatus(v); if(s==='offline'){ const h=CONFIG.hub; pushVehicle(id,{lat:h.lat+(Math.random()-.5)*.01,lng:h.lng+(Math.random()-.5)*.01,status:'in_service'}); } else pushVehicle(id,{status:'offline'}); render(); }

/* ---- fleet roster management (admin) — syncs to drivers via relay ---- */
function emitRoster(){ if(socket && net.connected){ socket.emit("saveRoster", VEHICLES.map(v=>({id:v.id,label:v.label,type:v.type,route:v.route})), ()=>{}); } rebuildFleet(); render(); }
function rosterSetLabel(id,val){ const v=VEHICLES.find(x=>x.id===id); if(v){ v.label=(val||v.id).trim(); emitRoster(); } }
function rosterSetType(id,tp){ const v=VEHICLES.find(x=>x.id===id); if(v){ v.type=(tp==='van'?'van':'bus'); emitRoster(); } }
function rosterSetRoute(id,r){ const v=VEHICLES.find(x=>x.id===id); if(v){ v.route=(["A","B","C"].includes(r)?r:'A'); emitRoster(); } }
function rosterRemove(id){ if(!confirm("Remove "+id+" from the fleet? Drivers will no longer see it.")) return; VEHICLES=VEHICLES.filter(x=>x.id!==id); emitRoster(); toast("Removed "+id,"info"); }
function nextVehicleId(route){
  let n=0; const re=new RegExp("^"+route+"(\\d+)$");
  VEHICLES.forEach(v=>{ const m=(v.id||"").match(re); if(m) n=Math.max(n, parseInt(m[1])); });
  let cand, k=n;
  do { k++; cand=route+k; } while(VEHICLES.find(x=>x.id===cand));
  return cand;
}
function rosterAdd(){
  const nmEl=$("nv-name"), tpEl=$("nv-type"), rtEl=$("nv-route");
  const route=(rtEl&&["A","B","C"].includes(rtEl.value))?rtEl.value:"A";
  const id=nextVehicleId(route);
  const type=(tpEl&&tpEl.value==="van")?"van":"bus";
  const name=((nmEl&&nmEl.value)||"").trim()||(id+" · "+ROUTE_TO_LINE[route]);
  VEHICLES.push({ id, label:name, type, route });
  emitRoster(); toast("Added "+id,"ok");
}

/* ============================================================
   Re-render helpers (update live bits without rebuilding view)
   ============================================================ */
function opsFleetRows(){
  return Object.values(VEH).sort((a,b)=>a.id.localeCompare(b.id)).map(v=>{
    const s=effStatus(v),[bg,fg]=statusStyle(s),col=vcolor(v),off=(s==='offline');
    return `<div class="flex items-center gap-3 p-3">
      <span class="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style="background:${col}">${vehSVG(v.type,lineFor(v).text)}</span>
      <div class="flex-1 min-w-0">
        <p class="font-bold text-[15px]">${vlabel(v)} <span class="font-normal text-[12px]" style="color:#9b8b80">· ${v.id}${(!off&&v.onboard!=null&&v.onboard!=="")?' · '+v.onboard+' aboard':''}</span></p>
        ${(!off&&v.driverName)?`<p class="text-[12.5px] font-semibold" style="color:#1F6E5E">🧑‍✈️ ${v.driverName}</p>`:''}
        ${(!off&&v.tripFrom&&v.tripTo)?`<p class="text-[12.5px] font-semibold" style="color:#6E1023">🚍 ${v.tripFrom} → ${v.tripTo}</p>`:''}
        ${off?`<p class="text-[12px]" style="color:#b08">No driver — awaiting sign-in</p>`:`<p class="text-[12px]" style="color:#9b8b80">${v.lat!=null?v.lat.toFixed(4)+', '+v.lng.toFixed(4):'no fix'} · ${t("lastseen")} ${ago(v.ts)}</p>`}
      </div>
      <span class="pill" style="background:${bg};color:${fg}">${statusLabel(s)}</span>
      <button onclick="adminRename('${v.id}')" class="text-[12px] font-bold px-2 py-1 rounded-lg" style="border:1.5px solid rgba(110,16,35,.2);color:#6E1023">Rename</button>
      <button onclick="opsToggle('${v.id}')" class="text-[12px] font-bold px-2 py-1 rounded-lg" style="border:1.5px solid rgba(110,16,35,.2);color:#6E1023">${s==='offline'?'Set live':'Set off'}</button>
    </div>`;
  }).join("");
}
function rerenderLive(){
  const route=(location.hash.replace("#","")||"riders");
  if(route==="riders"){ renderMarkers(); renderVehList(); }
  else if(route==="ops"){ const c=$("ops-fleet"); if(c) c.innerHTML=opsFleetRows(); }
}
setInterval(()=>{ // keep "last seen" + stale/lost styling fresh
  const route=(location.hash.replace("#","")||"riders");
  if(route==="riders"){ renderMarkers(); renderVehList(); }
  else if(route==="ops" && adminUnlocked){ const c=$("ops-fleet"); if(c) c.innerHTML=opsFleetRows(); }
}, 5000);

/* ============================================================
   Router
   ============================================================ */
function teardown(){ if(map){ map.remove(); map=null; markers={}; } }
function isTypingField(){ const a=document.activeElement; return !!(a && /^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName)); }
function maybeRenderOps(){ if(curRoute()!=="ops") return; if(!adminUnlocked) return; if(isTypingField()) return; render(); }
function render(){
  const route=(location.hash.replace("#","")||"riders");
  teardown();
  const views={ riders:viewRiders, ops:viewOps };
  $("app").innerHTML=(views[route]||viewRiders)();
  $("app").dataset.view=route;
  if(route==="riders"){ setTimeout(()=>{ initMap(); renderVehList(); },50); }
}
window.addEventListener("hashchange",render);
window.addEventListener("DOMContentLoaded",render);
render();

/* ============================================================
   PWA: service worker + "Add to Home Screen"
   ============================================================ */
// Register the service worker (only when served over http/https, not file://)
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
// Android/Chrome: capture the install prompt so we can offer a button
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",(e)=>{ e.preventDefault(); deferredPrompt=e; showInstallBar(); });
function isStandalone(){ return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone===true; }
function lsGet(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,v);}catch(e){} }
function showInstallBar(){
  if(isStandalone() || lsGet("fetna_install_dismissed")==="1" || $("install-bar")) return;
  const iOS=/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  const bar=document.createElement("div");
  bar.id="install-bar";
  bar.style.cssText="position:fixed;left:12px;right:12px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:2500;display:flex;align-items:center;gap:10px;background:#2A1216;color:#fff;border:1px solid rgba(227,178,60,.5);border-radius:14px;padding:10px 12px;box-shadow:0 12px 30px rgba(0,0,0,.35);max-width:560px;margin:0 auto";
  bar.innerHTML=`<span style="font-size:22px">📲</span>
    <div style="flex:1;font-size:13px;line-height:1.35">
      <b>Install FeTNA Shuttle</b><br>
      <span style="color:#e8cfa0">${iOS?'Tap the Share icon, then “Add to Home Screen”.':'Add it to your home screen for quick access.'}</span>
    </div>
    ${iOS?'':'<button id="install-go" style="background:#C2902B;color:#2A1216;font-weight:700;font-size:13px;padding:8px 12px;border:0;border-radius:10px">Install</button>'}
    <button id="install-x" aria-label="dismiss" style="background:transparent;color:#cbb6a0;font-size:20px;line-height:1;padding:0 4px">×</button>`;
  document.body.appendChild(bar);
  const go=$("install-go"); if(go) go.onclick=async()=>{ if(deferredPrompt){ deferredPrompt.prompt(); try{await deferredPrompt.userChoice;}catch(e){} deferredPrompt=null; } bar.remove(); };
  $("install-x").onclick=()=>{ lsSet("fetna_install_dismissed","1"); bar.remove(); };
}
// iOS Safari never fires beforeinstallprompt — show the hint there after a moment
window.addEventListener("load",()=>{
  const iOS=/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  if(iOS && !isStandalone()) setTimeout(showInstallBar,1200);
});
</script>
